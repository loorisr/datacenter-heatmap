name: Deploy Heatmap to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight to refresh data
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas folium requests openpyxl

      - name: Generate Heatmap
        run: python main.py

      - name: Prepare for deployment
        # Rename the output to index.html so it serves as the home page
        run: mv datacenter_heatmap.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4